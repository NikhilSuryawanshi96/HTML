<hr>

<fieldset>
    <legend>Student Information</legend>

    <label for="student_name">Student Name:</label>
    <input type="text" id="student_name" name="student_name" required><br><br>

    <label for="mother_name">Mother's Name:</label>
    <input type="text" id="mother_name" name="mother_name" required><br><br>

    <label for="student_email">Email:</label>
    <input type="email" id="student_email" name="student_email" required><br><br>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" required><br><br>

    <label for="birth_date">Birth Date:</label>
    <input type="date" id="birth_date" name="birth_date" required><br><br>

    <label>Gender:</label>
    <input type="radio" id="male" name="gender" value="Male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="Female">
    <label for="female">Female</label><br><br>

    <label>Course Type:</label>
    <input type="radio" id="regular" name="course" value="Regular">
    <label for="regular">Regular</label>

    <input type="radio" id="distance" name="course" value="Distance">
    <label for="distance">Distance</label><br><br>

</fieldset>

<br>
